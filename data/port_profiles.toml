# Base congestion profiles per port, keyed by UN/LOCODE (the `locode` field in ports.toml).
# Represents relative typical load used by the (mocked) congestion tool.
#   base_util      — typical capacity utilization, 0.0 (empty) to 1.0 (at capacity)
#   volatility     — day-to-day swing applied to base_util
#   typical_wait_h — baseline berth wait in hours
#   berths         — number of berths

# --- Major East Asian hubs — typically highly loaded ---
